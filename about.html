    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            min-height: 2000px;
        }

        .scrapbook-canvas {
            position: relative;
            width: 100%;
            max-width: 1100px; 
            margin: 0 auto;
            height: 100%;
        }

        .sticker {
            position: absolute;
            display: block;
            height: auto;
            /*shadow for 3d effect */
            filter: drop-shadow(3px 5px 8px rgba(0,0,0,0.15));
            transform-origin: 0 0;
        }

        .sticker img {
            width: 100%;
            height: auto;
            object-fit: cover;
            object-position: center;
        }

        .text-sticker {
            font-family: 'Courier New', Courier, monospace;
            line-height: 1.4;
            color: #333;
            pointer-events: none; 
        }

        .debug .sticker {
            outline: 1px solid red;
        }
    </style>
</head>
<body>
    <nav>
        <a href="https://m4ll1ka.github.io"><img src="https://m4ll1ka.github.io/docs/assets/images/melogopng.png" class="logo"></a>

    </nav>
